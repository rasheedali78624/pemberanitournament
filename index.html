<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pemberani Badminton Tournament</title>
  
  <link rel="icon" href="logo.png" type="image/png">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root {
      --gold-primary: #D4AF37;
      --gold-light: #F3E5AB;
      --gold-dark: #AA8C2C;
      --bg-main: #0a0a0a;
      --bg-card: #151515;
      --bg-card-border: #2a2a2a;
      --text-main: #e0e0e0;
      --text-muted: #888888;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--bg-main);
      color: var(--text-main);
      min-height: 100vh;
      padding: 1.5rem 1rem 4rem;
      background-image: radial-gradient(circle at top, #1a1a1a 0%, #0a0a0a 100%);
    }

    /* ---------- LAYOUT & TYPOGRAPHY ---------- */
    .app {
      max-width: 900px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    .header-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    
    .main-logo {
      width: 140px; 
      height: auto;
      margin-bottom: 1rem;
      filter: drop-shadow(0 4px 15px rgba(212, 175, 55, 0.4));
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      background: linear-gradient(to bottom, #FFF, var(--gold-primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
      margin-bottom: 0.2rem;
      line-height: 1.1;
    }

    .subhead {
      color: var(--gold-light);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--bg-card-border);
      padding-bottom: 1rem;
    }

    /* ---------- TABS ---------- */
    .tabs {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
      background: var(--bg-card);
      padding: 0.5rem;
      border-radius: 8px;
      border: 1px solid var(--bg-card-border);
    }
    .tab-btn {
      flex: 1 0 auto;
      background: transparent;
      border: 1px solid transparent;
      padding: 0.6rem 1rem;
      border-radius: 4px;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .tab-btn.active {
      background: rgba(212, 175, 55, 0.1);
      color: var(--gold-primary);
      border-color: var(--gold-primary);
    }
    .tab-content {
      display: none;
      animation: fadeIn 0.3s ease;
    }
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    /* ---------- CARDS ---------- */
    .card {
      background: var(--bg-card);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.2rem;
      border: 1px solid var(--bg-card-border);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .card-title {
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--gold-primary);
      margin-bottom: 1.2rem;
      font-weight: 700;
      border-left: 4px solid var(--gold-primary);
      padding-left: 0.8rem;
    }

    /* ---------- COURTS (CONCURRENT MATCHES) ---------- */
    .courts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
    }
    .court-card {
      background: #0d0d0d;
      border: 1px solid var(--bg-card-border);
      border-radius: 6px;
      padding: 1.2rem;
      position: relative;
    }
    .court-header {
      font-size: 1.2rem;
      font-weight: bold;
      color: #fff;
      margin-bottom: 1rem;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 2px;
      background: #1a1a1a;
      padding: 0.5rem;
      border-radius: 4px;
      border-bottom: 2px solid var(--gold-dark);
    }
    .assign-select {
      width: 100%;
      padding: 0.8rem;
      background: #1a1a1a;
      color: #fff;
      border: 1px solid var(--gold-dark);
      border-radius: 4px;
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }
    .score-inputs {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 1rem;
    }
    .score-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #151515;
      padding: 0.8rem;
      border-radius: 4px;
      border: 1px solid #333;
    }
    .score-row input {
      width: 60px;
      background: #0a0a0a;
      border: 1px solid var(--gold-dark);
      color: var(--gold-primary);
      font-size: 1.2rem;
      text-align: center;
      padding: 0.4rem;
      border-radius: 4px;
      font-weight: bold;
    }
    .score-row span { flex: 1; text-align: center; font-size: 0.9rem; font-weight: 600; }
    
    .btn {
      background: #1a1a1a;
      border: 1px solid var(--gold-dark);
      color: var(--gold-primary);
      padding: 0.6rem 1.4rem;
      border-radius: 4px;
      font-weight: 600;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.2s;
      width: 100%;
      display: block;
      text-align: center;
    }
    .btn:hover { background: var(--gold-primary); color: #000; }
    .btn-submit { background: var(--gold-dark); color: #fff; margin-top: 1rem; border: none; }
    .btn-submit:hover { background: var(--gold-primary); }

    /* ----- STANDINGS TABLE ----- */
    .standings-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    .standings-table th {
      text-align: left;
      color: var(--gold-light);
      font-weight: 600;
      padding: 0.8rem 0.4rem;
      border-bottom: 2px solid var(--gold-dark);
      text-transform: uppercase;
    }
    .standings-table td {
      padding: 0.8rem 0.4rem;
      border-bottom: 1px solid var(--bg-card-border);
    }
    .standings-table tr.qualified td { background: rgba(212, 175, 55, 0.05); }
    .rank-badge {
      display: inline-block;
      width: 26px;
      height: 26px;
      background: #333;
      border-radius: 50%;
      text-align: center;
      line-height: 26px;
      font-weight: 700;
      font-size: 0.8rem;
    }
    .rank-1 { background: var(--gold-primary); color: #000; }
    .rank-2 { background: #C0C0C0; color: #000; } /* Silver */
    .rank-3 { background: #CD7F32; color: #000; } /* Bronze */

    /* ----- FIXTURES ----- */
    .fixture-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem;
      border-bottom: 1px solid var(--bg-card-border);
      background: rgba(26,26,26,0.5);
      margin-bottom: 0.5rem;
      border-radius: 4px;
    }
    .fixture-status {
      font-size: 0.75rem;
      background: #333;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      color: #ccc;
      text-transform: uppercase;
      font-weight: bold;
    }
    .fixture-status.completed { background: var(--gold-dark); color: #fff; }
    .fixture-status.court1 { border-left: 3px solid #4facfe; }
    .fixture-status.court2 { border-left: 3px solid #f5576c; }

    /* ----- BRACKET CHART ----- */
    .bracket-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 2rem;
      padding: 1rem 0;
      overflow-x: auto;
    }
    .bracket-col { display: flex; flex-direction: column; justify-content: space-around; gap: 2rem; }
    .bracket-node {
      background: #0d0d0d;
      border: 1px solid var(--gold-dark);
      padding: 1rem;
      border-radius: 6px;
      min-width: 200px;
      position: relative;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    .bracket-label {
      font-size: 0.7rem;
      color: var(--gold-light);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
      border-bottom: 1px solid #333;
      padding-bottom: 0.3rem;
    }
    .bracket-team {
      padding: 0.4rem;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .bracket-team.winner { color: var(--gold-primary); font-weight: 800; }
    .bracket-vs { font-size: 0.7rem; color: #666; margin: 0.2rem 0; }

    /* Connector lines */
    .node-sf { position: relative; }
    .node-sf::after {
      content: '';
      position: absolute;
      right: -2rem;
      top: 50%;
      width: 2rem;
      height: 2px;
      background: var(--gold-dark);
    }
    .col-final { position: relative; }
    .col-final::before {
      content: '';
      position: absolute;
      left: -2rem;
      top: 25%;
      bottom: 25%;
      width: 2px;
      background: var(--gold-dark);
    }
    .node-final { position: relative; }
    .node-final::before {
      content: '';
      position: absolute;
      left: -2rem;
      top: 50%;
      width: 2rem;
      height: 2px;
      background: var(--gold-dark);
    }

    /* ----- CERTIFICATES ----- */
    .cert-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
    }
    .cert-card {
      background: #111;
      border: 1px solid var(--bg-card-border);
      border-radius: 6px;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
    }
    .cert-card:hover { border-color: var(--gold-primary); }
    .cert-card .rank-label { font-size: 0.8rem; color: var(--gold-light); margin-top: 0.5rem; }
    
    .text-center { text-align: center; }
    .text-gold { color: var(--gold-primary); }

    @media (max-width: 600px) {
      .bracket-container { flex-direction: column; }
      .node-sf::after, .col-final::before, .node-final::before { display: none; }
    }
  </style>
</head>
<body>

<div class="app">
  
  <div class="header-container">
    <img src="logo.png" alt="Pemberani Badminton Club" class="main-logo">
    <h1>Pemberani Badminton Tournament</h1>
  </div>
  
  <div class="subhead">Play with Courage. Win with Pride.</div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="tabCourts">Active Courts</button>
    <button class="tab-btn" data-tab="tabFixtures">Results & Fixtures</button>
    <button class="tab-btn" data-tab="tabStandings">Standings</button>
    <button class="tab-btn" data-tab="tabKnockout">Bracket Chart</button>
    <button class="tab-btn" data-tab="tabCerts">Certificates</button>
  </div>

  <div id="tabCourts" class="tab-content active">
    <div class="courts-grid">
      <div class="court-card" id="court1Box">
        <div class="court-header">Court 1</div>
        <select class="assign-select" id="court1Select">
          <option value="">-- Assign a Match --</option>
        </select>
        <div id="court1Active" style="display: none;">
          <div class="text-center text-gold" id="court1MatchLabel" style="font-weight: bold; margin-bottom: 0.5rem;"></div>
          <div class="score-inputs">
            <div class="score-row">
              <span id="c1p1Name">Team A</span>
              <input type="number" id="c1s1p1" placeholder="S1" min="0">
              <input type="number" id="c1s2p1" placeholder="S2" min="0">
            </div>
            <div class="score-row">
              <span id="c1p2Name">Team B</span>
              <input type="number" id="c1s1p2" placeholder="S1" min="0">
              <input type="number" id="c1s2p2" placeholder="S2" min="0">
            </div>
          </div>
          <button class="btn btn-submit" onclick="submitCourtScore(1)">Submit Final Score</button>
          <button class="btn" style="margin-top: 0.5rem; background: transparent; border: 1px solid #555; color: #aaa;" onclick="clearCourt(1)">Clear Court</button>
        </div>
      </div>

      <div class="court-card" id="court2Box">
        <div class="court-header">Court 2</div>
        <select class="assign-select" id="court2Select">
          <option value="">-- Assign a Match --</option>
        </select>
        <div id="court2Active" style="display: none;">
          <div class="text-center text-gold" id="court2MatchLabel" style="font-weight: bold; margin-bottom: 0.5rem;"></div>
          <div class="score-inputs">
            <div class="score-row">
              <span id="c2p1Name">Team A</span>
              <input type="number" id="c2s1p1" placeholder="S1" min="0">
              <input type="number" id="c2s2p1" placeholder="S2" min="0">
            </div>
            <div class="score-row">
              <span id="c2p2Name">Team B</span>
              <input type="number" id="c2s1p2" placeholder="S1" min="0">
              <input type="number" id="c2s2p2" placeholder="S2" min="0">
            </div>
          </div>
          <button class="btn btn-submit" onclick="submitCourtScore(2)">Submit Final Score</button>
          <button class="btn" style="margin-top: 0.5rem; background: transparent; border: 1px solid #555; color: #aaa;" onclick="clearCourt(2)">Clear Court</button>
        </div>
      </div>
    </div>
  </div>

  <div id="tabFixtures" class="tab-content">
    <div class="card">
      <div class="card-title">Tournament Schedule & Results</div>
      <div id="fixtureList"></div>
    </div>
  </div>

  <div id="tabStandings" class="tab-content">
    <div class="card"><div class="card-title">Group A</div><div id="standingsA"></div></div>
    <div class="card"><div class="card-title">Group B</div><div id="standingsB"></div></div>
  </div>

  <div id="tabKnockout" class="tab-content">
    <div class="card" style="overflow-x: auto;">
      <div class="card-title text-center">Championship Bracket</div>
      <div class="bracket-container" id="bracketContainer">
        </div>
    </div>
  </div>

  <div id="tabCerts" class="tab-content">
    <div class="card">
      <div class="card-title">Official E-Certificates</div>
      <p class="text-muted" style="margin-bottom:1rem;">Select a pair to generate their digital certificate.</p>
      <div id="certGrid" class="cert-grid"></div>
      <div id="certPreviewArea"></div>
    </div>
  </div>
</div>

<script>
  // --------------------------------------------------------------
  // DATA CONFIGURATION
  // --------------------------------------------------------------
  const PAIRS = [
    { id: 6, name: 'Taufik & Haziq', group: 'A' },
    { id: 4, name: 'Bangmie & Syaqir', group: 'A' },
    { id: 3, name: 'Herman & Syahir', group: 'A' },
    { id: 9, name: 'Daus & Sepul', group: 'A' },
    { id: 5, name: 'Fareez & Nizam', group: 'A' },
    { id: 1, name: 'Jai & Rasheed', group: 'B' },
    { id: 2, name: 'Fauzi & Pok', group: 'B' },
    { id: 7, name: 'Aizat & Awie', group: 'B' },
    { id: 8, name: 'Sapik & Poknik', group: 'B' }
  ];

  function buildMatches() {
    const matches = [];
    const groups = { A: PAIRS.filter(p => p.group === 'A'), B: PAIRS.filter(p => p.group === 'B') };
    
    // Group Stage
    for (const g of ['A', 'B']) {
      const arr = groups[g];
      for (let i = 0; i < arr.length; i++) {
        for (let j = i+1; j < arr.length; j++) {
          matches.push({
            id: `g-${arr[i].id}-${arr[j].id}`,
            pair1: arr[i].id,
            pair2: arr[j].id,
            group: g,
            round: 'group',
            set1: null,
            set2: null,
            winner: null,
            status: 'upcoming', // upcoming, court1, court2, completed
          });
        }
      }
    }
    
    // Knockout Stage
    const koIds = ['sf1', 'sf2', 'third', 'final'];
    const koLabels = ['Semi-Final 1', 'Semi-Final 2', 'Bronze Match', 'Grand Final'];
    for (let i = 0; i < 4; i++) {
      matches.push({
        id: `ko-${koIds[i]}`,
        pair1: null,
        pair2: null,
        group: null,
        round: 'knockout',
        label: koLabels[i],
        set1: null,
        set2: null,
        winner: null,
        status: 'upcoming'
      });
    }
    return matches;
  }

  // --------------------------------------------------------------
  // STATE MANAGEMENT
  // --------------------------------------------------------------
  let matches = buildMatches();
  
  function loadState() {
    try {
      const saved = localStorage.getItem('pemberaniState');
      if (saved) {
        matches = JSON.parse(saved).matches;
      }
    } catch(e) {}
  }
  function saveState() {
    localStorage.setItem('pemberaniState', JSON.stringify({ matches }));
  }

  function getPair(id) { return PAIRS.find(p => p.id === id); }
  function getMatch(id) { return matches.find(m => m.id === id); }

  // --------------------------------------------------------------
  // COURTS LOGIC
  // --------------------------------------------------------------
  function setupCourts() {
    ['court1', 'court2'].forEach((courtId, index) => {
      const courtNum = index + 1;
      const selectEl = document.getElementById(`${courtId}Select`);
      
      // Populate select with upcoming matches
      const upcoming = matches.filter(m => m.status === 'upcoming' || m.status === `court${courtNum}`);
      let optionsHtml = '<option value="">-- Assign a Match --</option>';
      
      upcoming.forEach(m => {
        const p1 = getPair(m.pair1);
        const p2 = getPair(m.pair2);
        if(!p1 || !p2) return;
        const label = m.label || `Group ${m.group}: ${p1.name} vs ${p2.name}`;
        const selected = m.status === `court${courtNum}` ? 'selected' : '';
        optionsHtml += `<option value="${m.id}" ${selected}>${label}</option>`;
      });
      selectEl.innerHTML = optionsHtml;

      // Handle selection change
      selectEl.onchange = (e) => {
        const matchId = e.target.value;
        // Reset old match if exists
        const oldMatch = matches.find(m => m.status === `court${courtNum}`);
        if(oldMatch && oldMatch.id !== matchId) { oldMatch.status = 'upcoming'; }
        
        if (matchId) {
          const m = getMatch(matchId);
          m.status = `court${courtNum}`;
          showCourtActive(courtNum, m);
        } else {
          document.getElementById(`${courtId}Active`).style.display = 'none';
        }
        saveState();
        renderAll();
      };

      // Ensure view matches state on load
      const activeMatch = matches.find(m => m.status === `court${courtNum}`);
      if(activeMatch) { showCourtActive(courtNum, activeMatch); }
      else { document.getElementById(`${courtId}Active`).style.display = 'none'; }
    });
  }

  function showCourtActive(courtNum, m) {
    document.getElementById(`court${courtNum}Active`).style.display = 'block';
    const p1 = getPair(m.pair1);
    const p2 = getPair(m.pair2);
    document.getElementById(`court${courtNum}MatchLabel`).innerText = m.label || `Group ${m.group}`;
    document.getElementById(`c${courtNum}p1Name`).innerText = p1.name;
    document.getElementById(`c${courtNum}p2Name`).innerText = p2.name;
    
    // Clear inputs
    document.getElementById(`c${courtNum}s1p1`).value = m.set1 ? m.set1.p1 : '';
    document.getElementById(`c${courtNum}s2p1`).value = m.set2 ? m.set2.p1 : '';
    document.getElementById(`c${courtNum}s1p2`).value = m.set1 ? m.set1.p2 : '';
    document.getElementById(`c${courtNum}s2p2`).value = m.set2 ? m.set2.p2 : '';
  }

  function submitCourtScore(courtNum) {
    const match = matches.find(m => m.status === `court${courtNum}`);
    if(!match) return;

    const s1p1 = parseInt(document.getElementById(`c${courtNum}s1p1`).value) || 0;
    const s1p2 = parseInt(document.getElementById(`c${courtNum}s1p2`).value) || 0;
    const s2p1 = parseInt(document.getElementById(`c${courtNum}s2p1`).value) || 0;
    const s2p2 = parseInt(document.getElementById(`c${courtNum}s2p2`).value) || 0;

    match.set1 = { p1: s1p1, p2: s1p2 };
    match.set2 = { p1: s2p1, p2: s2p2 };

    const totalP1 = s1p1 + s2p1;
    const totalP2 = s1p2 + s2p2;

    if (totalP1 === totalP2) {
      alert('Scores are tied. Please enter a valid deciding score.');
      return;
    }

    match.winner = totalP1 > totalP2 ? match.pair1 : match.pair2;
    match.status = 'completed';

    // Knockout progression logic
    if (match.round === 'knockout') {
      if (match.id === 'ko-sf1') {
        const finalM = getMatch('ko-final');
        if (finalM) finalM.pair1 = match.winner;
        const thirdM = getMatch('ko-third');
        if (thirdM) thirdM.pair1 = match.winner === match.pair1 ? match.pair2 : match.pair1;
      }
      if (match.id === 'ko-sf2') {
        const finalM = getMatch('ko-final');
        if (finalM) finalM.pair2 = match.winner;
        const thirdM = getMatch('ko-third');
        if (thirdM) thirdM.pair2 = match.winner === match.pair1 ? match.pair2 : match.pair1;
      }
    }

    alert('Score saved successfully!');
    document.getElementById(`court${courtNum}Active`).style.display = 'none';
    saveState();
    renderAll();
  }

  function clearCourt(courtNum) {
    const match = matches.find(m => m.status === `court${courtNum}`);
    if(match) match.status = 'upcoming';
    document.getElementById(`court${courtNum}Select`).value = "";
    document.getElementById(`court${courtNum}Active`).style.display = 'none';
    saveState();
    renderAll();
  }


  // --------------------------------------------------------------
  // STANDINGS COMPUTATION
  // --------------------------------------------------------------
  function computeStandings(group) {
    const pairs = PAIRS.filter(p => p.group === group);
    const stats = pairs.map(p => ({
      ...p, played: 0, wins: 0, losses: 0, pf: 0, pa: 0, diff: 0, points: 0
    }));
    const groupMatches = matches.filter(m => m.group === group && m.status === 'completed' && m.winner);
    for (const m of groupMatches) {
      const p1 = stats.find(s => s.id === m.pair1);
      const p2 = stats.find(s => s.id === m.pair2);
      if (!p1 || !p2) continue;
      
      const totalP1 = (m.set1?.p1 || 0) + (m.set2?.p1 || 0);
      const totalP2 = (m.set1?.p2 || 0) + (m.set2?.p2 || 0);
      
      p1.played++; p2.played++;
      p1.pf += totalP1; p1.pa += totalP2;
      p2.pf += totalP2; p2.pa += totalP1;
      
      if (m.winner === p1.id) { p1.wins++; p2.losses++; p1.points += 2; }
      else if (m.winner === p2.id) { p2.wins++; p1.losses++; p2.points += 2; }
    }
    stats.forEach(s => { s.diff = s.pf - s.pa; });
    stats.sort((a,b) => b.points - a.points || b.diff - a.diff || b.pf - a.pf);
    return stats;
  }

  function getQualified() {
    const a = computeStandings('A').slice(0,2).map(s => s.id);
    const b = computeStandings('B').slice(0,2).map(s => s.id);
    return { A: a, B: b };
  }

  // --------------------------------------------------------------
  // RENDER FUNCTIONS
  // --------------------------------------------------------------
  function renderStandings() {
    ['A', 'B'].forEach(group => {
      const stats = computeStandings(group);
      const qual = getQualified()[group] || [];
      let html = `<table class="standings-table"><thead><tr><th>#</th><th>Team</th><th>P</th><th>W</th><th>L</th><th>Diff</th><th>Pts</th></tr></thead><tbody>`;
      stats.forEach((s, idx) => {
        const isQual = qual.includes(s.id);
        const rankClass = idx === 0 ? 'rank-1' : idx === 1 ? 'rank-2' : idx === 2 ? 'rank-3' : '';
        html += `<tr class="${isQual ? 'qualified' : ''}">
          <td><span class="rank-badge ${rankClass}">${idx+1}</span></td>
          <td><strong>${s.name}</strong></td>
          <td>${s.played}</td><td>${s.wins}</td><td>${s.losses}</td>
          <td>${s.diff > 0 ? '+'+s.diff : s.diff}</td><td><strong class="text-gold">${s.points}</strong></td>
        </tr>`;
      });
      html += '</tbody></table>';
      document.getElementById(`standings${group}`).innerHTML = html;
    });
  }

  function renderFixtures() {
    const container = document.getElementById('fixtureList');
    let html = '';
    
    // Auto-assign qualifiers if not set
    const qual = getQualified();
    const sf1 = getMatch('ko-sf1');
    const sf2 = getMatch('ko-sf2');
    if (sf1 && !sf1.pair1 && qual.A.length >= 2 && qual.B.length >= 2) {
      sf1.pair1 = qual.A[0]; sf1.pair2 = qual.B[1];
    }
    if (sf2 && !sf2.pair1 && qual.A.length >= 2 && qual.B.length >= 2) {
      sf2.pair1 = qual.B[0]; sf2.pair2 = qual.A[1];
    }

    const all = matches;
    all.forEach(m => {
      const p1 = getPair(m.pair1);
      const p2 = getPair(m.pair2);
      const label = m.label || `Grp ${m.group}`;
      const statusText = m.status === 'upcoming' ? 'UPCOMING' : m.status.toUpperCase();
      let setText = m.set1 ? `<br><span style="font-size:0.8rem; color:#888;">S1: ${m.set1.p1}-${m.set1.p2} | S2: ${m.set2.p1}-${m.set2.p2}</span>` : '';
      let winnerName = m.winner ? ` <span class="text-gold">(Winner: ${getPair(m.winner)?.name})</span>` : '';
      
      html += `
      <div class="fixture-item">
        <div style="flex: 1;">
          <div style="font-size:0.75rem; color:var(--gold-dark);">${label}</div>
          <strong style="${m.winner === m.pair1 ? 'color:var(--gold-primary)' : ''}">${p1?.name||'TBD'}</strong> 
          <span style="color:#666; font-size:0.8rem; margin:0 5px;">vs</span> 
          <strong style="${m.winner === m.pair2 ? 'color:var(--gold-primary)' : ''}">${p2?.name||'TBD'}</strong>
          ${setText}
          ${winnerName}
        </div>
        <div><span class="fixture-status ${m.status}">${statusText}</span></div>
      </div>`;
    });
    container.innerHTML = html;
  }

  function renderKnockout() {
    const container = document.getElementById('bracketContainer');
    const sf1 = getMatch('ko-sf1');
    const sf2 = getMatch('ko-sf2');
    const finalMatch = getMatch('ko-final');
    const thirdMatch = getMatch('ko-third');

    const renderNode = (m) => {
      if (!m) return '';
      const p1 = getPair(m.pair1);
      const p2 = getPair(m.pair2);
      const w = m.winner;
      
      return `
        <div class="bracket-node">
          <div class="bracket-label">${m.label}</div>
          <div class="bracket-team ${w === m.pair1 ? 'winner' : ''}">${p1 ? p1.name : 'TBD'}</div>
          <div class="bracket-vs">VS</div>
          <div class="bracket-team ${w === m.pair2 ? 'winner' : ''}">${p2 ? p2.name : 'TBD'}</div>
        </div>
      `;
    };

    container.innerHTML = `
      <div class="bracket-col">
        <div class="node-sf">${renderNode(sf1)}</div>
        <div class="node-sf">${renderNode(sf2)}</div>
      </div>
      <div class="bracket-col col-final">
        <div class="node-final">${renderNode(finalMatch)}</div>
        <div style="margin-top:2rem;">${renderNode(thirdMatch)}</div>
      </div>
    `;
  }

  // --------------------------------------------------------------
  // CERTIFICATES
  // --------------------------------------------------------------
  function renderCertificates() {
    const container = document.getElementById('certGrid');
    let html = '';
    
    PAIRS.forEach(p => {
      let rank = 'Participant';
      const finalM = getMatch('ko-final');
      const thirdM = getMatch('ko-third');
      
      if (finalM && finalM.winner === p.id) rank = 'Champion';
      else if (finalM && (finalM.pair1 === p.id || finalM.pair2 === p.id)) rank = 'Runner-Up';
      else if (thirdM && thirdM.winner === p.id) rank = '3rd Place';
      
      html += `<div class="cert-card" data-pairid="${p.id}">
        <div style="font-weight:bold; color:#fff;">${p.name}</div>
        <div class="rank-label">${rank}</div>
      </div>`;
    });
    container.innerHTML = html;

    container.querySelectorAll('.cert-card').forEach(el => {
      el.addEventListener('click', () => generateCertificate(parseInt(el.dataset.pairid)));
    });
  }

  function generateCertificate(pairId) {
    const p = PAIRS.find(x => x.id === pairId);
    if (!p) return;
    
    let rank = 'Official Participant';
    const finalM = getMatch('ko-final');
    const thirdM = getMatch('ko-third');
    if (finalM && finalM.winner === p.id) rank = 'Tournament Champion';
    else if (finalM && (finalM.pair1 === p.id || finalM.pair2 === p.id)) rank = 'Tournament Runner-Up';
    else if (thirdM && thirdM.winner === p.id) rank = '3rd Place Finisher';

    const preview = document.getElementById('certPreviewArea');
    preview.innerHTML = `
      <div id="certificateBox" style="background: linear-gradient(135deg, #151515, #0a0a0a); border: 2px solid var(--gold-dark); border-radius: 8px; padding: 3rem 2rem; text-align: center; max-width: 600px; margin: 2rem auto; position:relative; overflow:hidden;">
        <div style="position:absolute; top:-50px; left:-50px; width:150px; height:150px; background:var(--gold-primary); opacity:0.1; border-radius:50%; blur(20px);"></div>
        <h3 style="color: var(--gold-light); letter-spacing: 3px; text-transform: uppercase; font-size: 0.9rem; margin-bottom: 2rem;">Certificate of Achievement</h3>
        <h1 style="color: var(--gold-primary); margin-bottom: 0.5rem; font-size: 2.2rem;">${p.name}</h1>
        <div style="font-size: 1.2rem; color: #fff; margin-bottom: 2rem; text-transform: uppercase; letter-spacing: 1px;">${rank}</div>
        <div style="color: #666; font-size: 0.85rem; border-top: 1px solid #333; padding-top: 1rem; width: 60%; margin: 0 auto;">Pemberani Badminton Tournament<br>Play with Courage. Win with Pride.</div>
        <button class="btn btn-submit" id="downloadCertBtn" style="width: auto; margin: 2rem auto 0; position:relative; z-index:10;">Download PNG</button>
      </div>
    `;

    document.getElementById('downloadCertBtn').addEventListener('click', function() {
      this.style.display = 'none'; // hide button in screenshot
      const node = document.getElementById('certificateBox');
      html2canvas(node, { scale: 2, backgroundColor: '#0a0a0a' }).then(canvas => {
        const link = document.createElement('a');
        link.download = `Pemberani-Cert-${p.name}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
        this.style.display = 'block'; // show again
      });
    });
  }

  // --------------------------------------------------------------
  // TAB NAVIGATION & RENDER INIT
  // --------------------------------------------------------------
  function switchTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    document.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add('active');
    renderAll();
  }

  function renderAll() {
    renderStandings();
    renderFixtures();
    renderKnockout();
    renderCertificates();
    setupCourts();
  }

  // Init
  loadState();
  
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  renderAll();

</script>
</body>
</html>
